<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>امتحانات الدفعة - كلية نظم ومعلومات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --green: #00e676;
      --green-dim: #00c853;
      --red: #ff5252;
      --amber: #ffab40;
      --text: #e8e8f0;
      --text-dim: #7a7a9a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    /* ===== NAVBAR ===== */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.3rem;
      font-weight: 900;
    }

    .nav-brand i { color: var(--green); font-size: 1.5rem; }

    .nav-actions { display: flex; gap: 10px; }

    .btn {
      padding: 8px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    .btn-primary {
      background: var(--green);
      color: #000;
    }
    .btn-primary:hover { background: var(--green-dim); transform: translateY(-1px); }

    .btn-danger {
      background: var(--red);
      color: #fff;
    }
    .btn-danger:hover { opacity: 0.85; }

    .btn-blue {
      background: #2979ff;
      color: #fff;
    }
    .btn-blue:hover { background: #2962ff; }

    /* ===== MAIN ===== */
    #main { max-width: 860px; margin: 0 auto; padding: 2rem 1rem; }

    /* ===== HOME PAGE ===== */
    .page-title {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 2rem;
    }

    .page-title span { color: var(--green); }

    #quizzes-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
    }

    .quiz-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.8rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    .quiz-card:hover {
      border-color: var(--green);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,230,118,0.1);
    }

    .quiz-card h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .quiz-card p { color: var(--text-dim); font-size: 0.9rem; }

    .quiz-card .arrow {
      margin-top: 1.2rem;
      color: var(--green);
      font-size: 0.9rem;
    }

    /* ===== LOADING ===== */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-dim);
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== QUIZ PAGE ===== */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .quiz-header-title { font-size: 1.1rem; font-weight: 700; color: var(--green); }

    .progress-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
    }

    .question-num {
      font-size: 0.85rem;
      color: var(--green);
      font-weight: 700;
      margin-bottom: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .question-text {
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .options-grid { display: flex; flex-direction: column; gap: 12px; }

    .option {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.4rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1rem;
      font-weight: 600;
    }

    .option:hover { border-color: var(--green); background: rgba(0,230,118,0.05); }

    .option.selected { border-color: var(--green); background: rgba(0,230,118,0.1); }

    .option.correct { border-color: var(--green) !important; background: rgba(0,230,118,0.15) !important; }
    .option.wrong { border-color: var(--red) !important; background: rgba(255,82,82,0.15) !important; }

    .option-letter {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .selected .option-letter { background: var(--green); color: #000; }
    .correct .option-letter { background: var(--green); color: #000; }
    .wrong .option-letter { background: var(--red); color: #fff; }

    .tf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .tf-option {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tf-option:hover { border-color: var(--green); }
    .tf-option.selected { border-color: var(--green); background: rgba(0,230,118,0.1); }
    .tf-option.correct { border-color: var(--green) !important; background: rgba(0,230,118,0.15) !important; }
    .tf-option.wrong { border-color: var(--red) !important; background: rgba(255,82,82,0.15) !important; }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 1.2rem;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      resize: none;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus { border-color: var(--green); }

    .explanation {
      margin-top: 1.5rem;
      background: rgba(0,230,118,0.07);
      border: 1px solid rgba(0,230,118,0.2);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      color: #a0f0c0;
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .explanation strong { color: var(--green); }

    .quiz-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
    }

    /* ===== RESULTS ===== */
    .results-title {
      text-align: center;
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }

    .results-sub {
      text-align: center;
      color: var(--text-dim);
      margin-bottom: 2rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
    }

    .stat-num { font-size: 3rem; font-weight: 900; }
    .stat-label { color: var(--text-dim); font-size: 0.9rem; margin-top: 4px; }

    .score-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .score-pct { font-size: 5rem; font-weight: 900; }
    .score-frac { font-size: 1.5rem; color: var(--text-dim); margin-top: 4px; }

    .results-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    /* ===== ADMIN ===== */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .admin-quiz-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .admin-quiz-card h4 { font-size: 1.1rem; font-weight: 700; }
    .admin-quiz-card p { color: var(--text-dim); font-size: 0.9rem; margin-top: 4px; }

    .admin-actions { display: flex; gap: 8px; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      padding: 1rem;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h3 { font-size: 1.4rem; font-weight: 900; margin-bottom: 1.5rem; }

    .form-group { margin-bottom: 1.2rem; }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--green); }

    .form-group select option { background: var(--surface2); }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }

    .hidden { display: none !important; }

    /* ===== EMPTY STATE ===== */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-dim);
    }

    .empty i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    .empty p { font-size: 1.1rem; }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 24px;
      font-weight: 600;
      font-size: 0.95rem;
      z-index: 999;
      transition: transform 0.3s;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: var(--red); color: var(--red); }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .score-pct { font-size: 3.5rem; }
      .question-text { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="nav-brand">
      <i class="fas fa-graduation-cap"></i>
      امتحانات الدفعة
    </div>
    <div class="nav-actions">
      <button class="btn btn-ghost" onclick="showHome()">
        <i class="fas fa-home"></i> الرئيسية
      </button>
      <button class="btn btn-primary" onclick="promptAdmin()">
        <i class="fas fa-cog"></i> الإدارة
      </button>
    </div>
  </nav>

  <div id="main">

    <!-- HOME PAGE -->
    <div id="home-page">
      <div class="loading" id="home-loading">
        <div class="spinner"></div>
        <p>جاري تحميل الامتحانات...</p>
      </div>
      <div id="home-content" class="hidden">
        <h2 class="page-title">👋Welcome to the Exams Web <span></span></h2>
        <div id="quizzes-list"></div>
      </div>
    </div>

    <!-- QUIZ PAGE -->
    <div id="quiz-page" class="hidden">
      <div class="quiz-header">
        <div class="quiz-header-title" id="quiz-title"></div>
        <div style="display:flex;gap:10px;align-items:center">
          <span class="progress-pill" id="progress"></span>
          <button class="btn btn-ghost" onclick="exitQuiz()" style="color:var(--red)">
            <i class="fas fa-times"></i> خروج
          </button>
        </div>
      </div>
      <div class="question-card" id="question-card"></div>
      <div class="quiz-actions">
        <button class="btn btn-ghost" onclick="skipQuestion()">تخطي السؤال</button>
        <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()">تقديم الإجابة</button>
      </div>
    </div>

    <!-- RESULTS PAGE -->
    <div id="results-page" class="hidden">
      <h2 class="results-title">🎉 اكتمل الاختبار!</h2>
      <p class="results-sub">إليك نتيجتك</p>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="correct-count" style="color:var(--green)">0</div>
          <div class="stat-label">إجابة صحيحة</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="wrong-count" style="color:var(--red)">0</div>
          <div class="stat-label">إجابة خاطئة</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="skipped-count" style="color:var(--amber)">0</div>
          <div class="stat-label">تم تخطيها</div>
        </div>
      </div>

      <div class="score-display">
        <div class="score-pct" id="accuracy" style="color:var(--green)">0%</div>
        <div class="score-frac" id="score">0/0</div>
      </div>

      <div class="results-actions">
        <button class="btn btn-ghost" onclick="backToHome()">
          <i class="fas fa-home"></i> الرئيسية
        </button>
      </div>
    </div>

    <!-- ADMIN PAGE -->
    <div id="admin-page" class="hidden">
      <div class="admin-header">
        <h2 style="font-size:1.8rem;font-weight:900">لوحة الإدارة</h2>
        <button class="btn btn-primary" onclick="showAddQuizModal()">
          <i class="fas fa-plus"></i> امتحان جديد
        </button>
      </div>
      <div id="admin-quizzes-list"></div>
    </div>

  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- MODAL: Add/Edit Quiz -->
  <div id="quiz-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="modal-title">إضافة امتحان جديد</h3>
      <div class="form-group">
        <label>اسم الامتحان</label>
        <input type="text" id="quiz-name-input" placeholder="مثال: امتحان اقتصاد - سوق العمل">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('quiz-modal')">إلغاء</button>
        <button class="btn btn-primary" onclick="saveQuizModal()">حفظ</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Add Question -->
  <div id="question-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="question-modal-title">إضافة سؤال جديد</h3>

      <div class="form-group">
        <label>نوع السؤال</label>
        <select id="q-type" onchange="updateQuestionForm()">
          <option value="mcq">اختياري (MCQ)</option>
          <option value="tf">صح / خطأ</option>
          <option value="essay">مقالي</option>
        </select>
      </div>

      <div class="form-group">
        <label>نص السؤال</label>
        <textarea id="q-text" rows="3" placeholder="اكتب السؤال هنا..."></textarea>
      </div>

      <div id="mcq-section">
        <div class="form-group">
          <label>الخيار A</label>
          <input type="text" id="opt-0" placeholder="الخيار الأول">
        </div>
        <div class="form-group">
          <label>الخيار B</label>
          <input type="text" id="opt-1" placeholder="الخيار الثاني">
        </div>
        <div class="form-group">
          <label>الخيار C</label>
          <input type="text" id="opt-2" placeholder="الخيار الثالث">
        </div>
        <div class="form-group">
          <label>الخيار D</label>
          <input type="text" id="opt-3" placeholder="الخيار الرابع">
        </div>
        <div class="form-group">
          <label>الإجابة الصحيحة</label>
          <select id="correct-mcq">
            <option value="0">A</option>
            <option value="1">B</option>
            <option value="2">C</option>
            <option value="3">D</option>
          </select>
        </div>
      </div>

      <div id="tf-section" class="hidden">
        <div class="form-group">
          <label>الإجابة الصحيحة</label>
          <select id="correct-tf">
            <option value="0">صح</option>
            <option value="1">خطأ</option>
          </select>
        </div>
      </div>

      <div id="essay-section" class="hidden">
        <div class="form-group">
          <label>كلمات مفتاحية (افصل بينها بفاصلة)</label>
          <input type="text" id="keywords" placeholder="مثال: تضخم, أسعار, نقود">
        </div>
      </div>

      <div class="form-group">
        <label>شرح الإجابة (اختياري)</label>
        <textarea id="q-explanation" rows="2" placeholder="اكتب شرحاً للإجابة..."></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('question-modal')">إلغاء</button>
        <button class="btn btn-primary" id="save-question-btn" onclick="saveQuestion()">إضافة السؤال</button>
      </div>
    </div>
  </div>

  <script>
    // ====================== SUPABASE CONFIG ======================
    const SUPABASE_URL = 'https://qokkdckumwyykjeysyiq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_vHyhdum02ZCvIUqPQWX8Cw_4PA7aJYw';

    const api = (path, options = {}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...options.headers
      },
      ...options
    });

    // ====================== STATE ======================
    let quizzes = [];
    let currentQuiz = null;
    let currentQuestionIndex = 0;
    let userAnswers = {};
    let selectedIndex = null;
    let editingQuizId = null;
    let addingQuestionToQuizId = null;
    const ADMIN_PASSWORD = "leader123";

    // ====================== TOAST ======================
    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `show ${type}`;
      setTimeout(() => el.className = '', 2500);
    }

    // ====================== API FUNCTIONS ======================
    async function loadQuizzes() {
      try {
        const res = await api('quizzes?select=*&order=id');
        if (!res.ok) throw new Error();
        quizzes = await res.json();
        renderHome();
      } catch {
        toast('خطأ في تحميل البيانات', 'error');
        quizzes = [];
        renderHome();
      }
    }

    async function createQuiz(title) {
      const res = await api('quizzes', {
        method: 'POST',
        body: JSON.stringify({ title, questions: [] })
      });
      if (!res.ok) throw new Error();
      return (await res.json())[0];
    }

    async function updateQuiz(id, data) {
      const res = await api(`quizzes?id=eq.${id}`, {
        method: 'PATCH',
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error();
    }

    async function deleteQuizFromDB(id) {
      const res = await api(`quizzes?id=eq.${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
    }

    // ====================== RENDER HOME ======================
    function renderHome() {
      document.getElementById('home-loading').classList.add('hidden');
      document.getElementById('home-content').classList.remove('hidden');

      const container = document.getElementById('quizzes-list');
      if (quizzes.length === 0) {
        container.innerHTML = `<div class="empty"><i class="fas fa-book-open"></i><p>لا توجد امتحانات بعد</p></div>`;
        return;
      }
      container.innerHTML = quizzes.map(q => `
        <div class="quiz-card" onclick="startQuiz(${q.id})">
          <h3>${q.title}</h3>
          <p>${(q.questions || []).length} سؤال</p>
          <div class="arrow"><i class="fas fa-play-circle"></i> ابدأ الامتحان</div>
        </div>
      `).join('');
    }

    // ====================== QUIZ ======================
    function startQuiz(id) {
      currentQuiz = quizzes.find(q => q.id === id);
      if (!currentQuiz.questions || currentQuiz.questions.length === 0) {
        return toast('هذا الامتحان لا يحتوي على أسئلة بعد!', 'error');
      }
      currentQuestionIndex = 0;
      userAnswers = {};
      selectedIndex = null;
      showPage('quiz-page');
      document.getElementById('quiz-title').textContent = currentQuiz.title;
      showCurrentQuestion();
    }

    function showCurrentQuestion() {
      selectedIndex = null;
      const q = currentQuiz.questions[currentQuestionIndex];
      const total = currentQuiz.questions.length;
      document.getElementById('progress').textContent = `${currentQuestionIndex + 1} / ${total}`;
      document.getElementById('submit-btn').textContent =
        currentQuestionIndex === total - 1 ? 'إنهاء الامتحان' : 'تقديم الإجابة';

      let html = `
        <div class="question-num">السؤال ${currentQuestionIndex + 1}</div>
        <div class="question-text">${q.question}</div>
      `;

      if (q.type === 'mcq') {
        html += `<div class="options-grid">`;
        q.options.forEach((opt, i) => {
          html += `
            <div class="option" id="opt-${i}" onclick="selectOption(${i})">
              <span class="option-letter">${String.fromCharCode(65 + i)}</span>
              <span>${opt}</span>
            </div>`;
        });
        html += `</div>`;
      } else if (q.type === 'tf') {
        html += `
          <div class="tf-grid">
            <div class="tf-option" id="opt-0" onclick="selectOption(0)">✅ صح</div>
            <div class="tf-option" id="opt-1" onclick="selectOption(1)">❌ خطأ</div>
          </div>`;
      } else if (q.type === 'essay') {
        html += `<textarea id="essay-input" rows="6" placeholder="اكتب إجابتك هنا..."></textarea>`;
      }

      document.getElementById('question-card').innerHTML = html;
    }

    function selectOption(i) {
      selectedIndex = i;
      document.querySelectorAll('.option, .tf-option').forEach(el => {
        el.classList.remove('selected');
      });
      const el = document.getElementById(`opt-${i}`);
      if (el) el.classList.add('selected');
    }

    function submitAnswer() {
      const q = currentQuiz.questions[currentQuestionIndex];
      if (q.type === 'mcq' || q.type === 'tf') {
        if (selectedIndex === null) return toast('اختر إجابة أولاً!', 'error');
        userAnswers[currentQuestionIndex] = selectedIndex;
      } else {
        const val = document.getElementById('essay-input').value.trim();
        if (!val) return toast('اكتب إجابة!', 'error');
        userAnswers[currentQuestionIndex] = val;
      }
      showFeedback();
    }

    function showFeedback() {
      const q = currentQuiz.questions[currentQuestionIndex];
      const container = document.getElementById('question-card');
      let html = `<div class="question-text">${q.question}</div>`;

      if (q.type === 'mcq') {
        const userChoice = userAnswers[currentQuestionIndex];
        html += `<div class="options-grid">`;
        q.options.forEach((opt, i) => {
          let cls = '';
          if (i === q.correct) cls = 'correct';
          else if (i === userChoice) cls = 'wrong';
          html += `
            <div class="option ${cls}">
              <span class="option-letter">${String.fromCharCode(65 + i)}</span>
              <span>${opt}</span>
              ${i === q.correct ? '<i class="fas fa-check" style="margin-right:auto;color:var(--green)"></i>' : ''}
              ${i === userChoice && i !== q.correct ? '<i class="fas fa-times" style="margin-right:auto;color:var(--red)"></i>' : ''}
            </div>`;
        });
        html += `</div>`;
      } else if (q.type === 'tf') {
        const userChoice = userAnswers[currentQuestionIndex];
        ['صح', 'خطأ'].forEach((label, i) => {
          let cls = '';
          if (i === q.correct) cls = 'correct';
          else if (i === userChoice) cls = 'wrong';
          html += `<div class="tf-option ${cls}" style="display:inline-block;width:48%;margin:1%">${label}</div>`;
        });
      } else {
        const answer = userAnswers[currentQuestionIndex];
        const isCorrect = q.keywords && q.keywords.some(kw => answer.toLowerCase().includes(kw.toLowerCase()));
        html += `
          <div style="background:var(--surface2);border-radius:12px;padding:1.2rem;margin-bottom:1rem">
            <p style="color:var(--text-dim);margin-bottom:6px">إجابتك:</p>
            <p>${answer}</p>
          </div>
          <div style="font-size:1.2rem;font-weight:700;color:${isCorrect ? 'var(--green)' : 'var(--red)'}">
            ${isCorrect ? '✅ إجابة صحيحة' : '❌ إجابة خاطئة'}
          </div>`;
      }

      if (q.explanation) {
        html += `<div class="explanation"><strong>💡 الشرح:</strong> ${q.explanation}</div>`;
      }

      html += `<div style="text-align:center;margin-top:1.5rem">
        <button class="btn btn-primary" onclick="nextQuestion()" style="padding:12px 40px;font-size:1.1rem">
          ${currentQuestionIndex === currentQuiz.questions.length - 1 ? 'عرض النتائج' : 'السؤال التالي'} <i class="fas fa-arrow-left"></i>
        </button>
      </div>`;

      container.innerHTML = html;
      document.getElementById('submit-btn').style.display = 'none';
      document.querySelector('.quiz-actions button:first-child').style.display = 'none';
    }

    function nextQuestion() {
      document.getElementById('submit-btn').style.display = '';
      document.querySelector('.quiz-actions button:first-child').style.display = '';
      currentQuestionIndex++;
      if (currentQuestionIndex >= currentQuiz.questions.length) {
        showResults();
      } else {
        showCurrentQuestion();
      }
    }

    function skipQuestion() {
      userAnswers[currentQuestionIndex] = null;
      currentQuestionIndex++;
      if (currentQuestionIndex >= currentQuiz.questions.length) showResults();
      else showCurrentQuestion();
    }

    function exitQuiz() {
      if (confirm('هل تريد الخروج من الامتحان؟')) showHome();
    }

    // ====================== RESULTS ======================
    function showResults() {
      showPage('results-page');
      let correct = 0, wrong = 0, skipped = 0;
      currentQuiz.questions.forEach((q, i) => {
        const ans = userAnswers[i];
        if (ans === null || ans === undefined) { skipped++; return; }
        if (q.type === 'essay') {
          if (q.keywords && q.keywords.some(kw => ans.toLowerCase().includes(kw.toLowerCase()))) correct++;
          else wrong++;
        } else {
          if (ans === q.correct) correct++;
          else wrong++;
        }
      });
      const total = currentQuiz.questions.length;
      const pct = Math.round((correct / total) * 100);

      document.getElementById('correct-count').textContent = correct;
      document.getElementById('wrong-count').textContent = wrong;
      document.getElementById('skipped-count').textContent = skipped;
      document.getElementById('accuracy').textContent = `${pct}%`;
      document.getElementById('score').textContent = `${correct} من ${total}`;
    }

    function backToHome() { showHome(); }

    // ====================== ADMIN ======================
    function promptAdmin() {
      const pass = prompt('🔑 كلمة السر:');
      if (pass !== ADMIN_PASSWORD) return toast('كلمة سر خاطئة!', 'error');
      showPage('admin-page');
      renderAdminQuizzes();
    }

    function renderAdminQuizzes() {
      const container = document.getElementById('admin-quizzes-list');
      if (quizzes.length === 0) {
        container.innerHTML = `<div class="empty"><i class="fas fa-plus-circle"></i><p>لا توجد امتحانات — اضغط "امتحان جديد"</p></div>`;
        return;
      }
      container.innerHTML = quizzes.map(q => `
        <div class="admin-quiz-card">
          <div>
            <h4>${q.title}</h4>
            <p>${(q.questions || []).length} سؤال</p>
          </div>
          <div class="admin-actions">
            <button class="btn btn-blue" onclick="openEditQuiz(${q.id})">
              <i class="fas fa-edit"></i> تعديل
            </button>
            <button class="btn btn-danger" onclick="confirmDeleteQuiz(${q.id})">
              <i class="fas fa-trash"></i> حذف
            </button>
          </div>
        </div>
      `).join('');
    }

    function showAddQuizModal() {
      editingQuizId = null;
      document.getElementById('modal-title').textContent = 'إضافة امتحان جديد';
      document.getElementById('quiz-name-input').value = '';
      document.getElementById('quiz-modal').classList.remove('hidden');
    }

    async function saveQuizModal() {
      const title = document.getElementById('quiz-name-input').value.trim();
      if (!title) return toast('اكتب اسم الامتحان!', 'error');
      try {
        if (editingQuizId) {
          await updateQuiz(editingQuizId, { title });
          const q = quizzes.find(q => q.id === editingQuizId);
          if (q) q.title = title;
          toast('تم تحديث الامتحان ✅');
        } else {
          const newQuiz = await createQuiz(title);
          quizzes.push(newQuiz);
          toast('تم إضافة الامتحان ✅');
        }
        closeModal('quiz-modal');
        renderAdminQuizzes();
      } catch {
        toast('خطأ في الحفظ!', 'error');
      }
    }

    async function confirmDeleteQuiz(id) {
      if (!confirm('حذف هذا الامتحان نهائياً؟')) return;
      try {
        await deleteQuizFromDB(id);
        quizzes = quizzes.filter(q => q.id !== id);
        renderAdminQuizzes();
        toast('تم الحذف ✅');
      } catch {
        toast('خطأ في الحذف!', 'error');
      }
    }

    // ===== EDIT QUIZ (add/remove questions) =====
    function openEditQuiz(id) {
      addingQuestionToQuizId = id;
      const quiz = quizzes.find(q => q.id === id);
      const container = document.getElementById('admin-quizzes-list');

      let html = `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.5rem">
          <button class="btn btn-ghost" onclick="renderAdminQuizzes()">
            <i class="fas fa-arrow-right"></i> رجوع
          </button>
          <h3 style="font-size:1.4rem;font-weight:900">${quiz.title}</h3>
        </div>
        <button class="btn btn-primary" onclick="openAddQuestionModal()" style="margin-bottom:1.2rem">
          <i class="fas fa-plus"></i> إضافة سؤال
        </button>
        <div>
      `;

      (quiz.questions || []).forEach((q, i) => {
        html += `
          <div class="admin-quiz-card">
            <div style="flex:1;margin-left:1rem">
              <p style="font-weight:600">${i + 1}. ${q.question.substring(0, 80)}${q.question.length > 80 ? '...' : ''}</p>
              <p style="color:var(--text-dim);font-size:0.85rem;margin-top:4px">${q.type === 'mcq' ? 'اختياري' : q.type === 'tf' ? 'صح/خطأ' : 'مقالي'}</p>
            </div>
            <button class="btn btn-blue" onclick="openEditQuestionModal(${id}, ${i})" style="margin-left:8px">
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-danger" onclick="deleteQuestion(${id}, ${i})">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        `;
      });

      if ((quiz.questions || []).length === 0) {
        html += `<div class="empty"><i class="fas fa-question-circle"></i><p>لا توجد أسئلة بعد</p></div>`;
      }

      html += `</div>`;
      container.innerHTML = html;
    }

    let editingQuestionIndex = null;

    function openEditQuestionModal(quizId, qIndex) {
      addingQuestionToQuizId = quizId;
      editingQuestionIndex = qIndex;
      const quiz = quizzes.find(q => q.id === quizId);
      const q = quiz.questions[qIndex];
      document.getElementById('q-type').value = q.type;
      document.getElementById('q-text').value = q.question;
      document.getElementById('q-explanation').value = q.explanation || '';
      if (q.type === 'mcq') {
        q.options.forEach((opt, i) => document.getElementById(`opt-${i}`).value = opt);
        document.getElementById('correct-mcq').value = q.correct;
      } else if (q.type === 'tf') {
        document.getElementById('correct-tf').value = q.correct;
      } else {
        document.getElementById('keywords').value = (q.keywords || []).join(', ');
      }
      updateQuestionForm();
      document.getElementById('question-modal-title').textContent = 'تعديل السؤال';
      document.getElementById('save-question-btn').textContent = 'حفظ التعديل';
      document.getElementById('question-modal').classList.remove('hidden');
    }

    function openAddQuestionModal() {
      editingQuestionIndex = null;
      document.getElementById('question-modal-title').textContent = 'إضافة سؤال جديد';
      document.getElementById('save-question-btn').textContent = 'إضافة السؤال';
      document.getElementById('q-type').value = 'mcq';
      document.getElementById('q-text').value = '';
      ['opt-0','opt-1','opt-2','opt-3'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('correct-mcq').value = '0';
      document.getElementById('correct-tf').value = '0';
      document.getElementById('keywords').value = '';
      document.getElementById('q-explanation').value = '';
      updateQuestionForm();
      document.getElementById('question-modal').classList.remove('hidden');
    }

    function updateQuestionForm() {
      const type = document.getElementById('q-type').value;
      document.getElementById('mcq-section').classList.toggle('hidden', type !== 'mcq');
      document.getElementById('tf-section').classList.toggle('hidden', type !== 'tf');
      document.getElementById('essay-section').classList.toggle('hidden', type !== 'essay');
    }

    async function saveQuestion() {
      const type = document.getElementById('q-type').value;
      const questionText = document.getElementById('q-text').value.trim();
      if (!questionText) return toast('اكتب نص السؤال!', 'error');

      let q = { id: Date.now(), type, question: questionText, explanation: document.getElementById('q-explanation').value.trim() };

      if (type === 'mcq') {
        const opts = ['opt-0','opt-1','opt-2','opt-3'].map(id => document.getElementById(id).value.trim());
        if (opts.some(o => !o)) return toast('اكتب جميع الخيارات!', 'error');
        q.options = opts;
        q.correct = parseInt(document.getElementById('correct-mcq').value);
      } else if (type === 'tf') {
        q.options = ['صح', 'خطأ'];
        q.correct = parseInt(document.getElementById('correct-tf').value);
      } else {
        const kw = document.getElementById('keywords').value.trim();
        q.keywords = kw ? kw.split(',').map(k => k.trim()) : [];
      }

      const quiz = quizzes.find(q => q.id === addingQuestionToQuizId);
      quiz.questions = quiz.questions || [];

      let oldQ = null;
      if (editingQuestionIndex !== null) {
        oldQ = quiz.questions[editingQuestionIndex];
        quiz.questions[editingQuestionIndex] = { ...oldQ, ...q };
      } else {
        quiz.questions.push(q);
      }

      try {
        await updateQuiz(quiz.id, { questions: quiz.questions });
        toast(editingQuestionIndex !== null ? 'تم تعديل السؤال ✅' : 'تم إضافة السؤال ✅');
        closeModal('question-modal');
        openEditQuiz(quiz.id);
      } catch {
        if (editingQuestionIndex !== null) quiz.questions[editingQuestionIndex] = oldQ;
        else quiz.questions.pop();
        toast('خطأ في الحفظ!', 'error');
      }
    }

    async function deleteQuestion(quizId, index) {
      if (!confirm('حذف هذا السؤال؟')) return;
      const quiz = quizzes.find(q => q.id === quizId);
      const removed = quiz.questions.splice(index, 1);
      try {
        await updateQuiz(quiz.id, { questions: quiz.questions });
        toast('تم الحذف ✅');
        openEditQuiz(quizId);
      } catch {
        quiz.questions.splice(index, 0, removed[0]);
        toast('خطأ في الحذف!', 'error');
      }
    }

    // ====================== HELPERS ======================
    function showPage(id) {
      document.querySelectorAll('#main > div').forEach(d => d.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    function showHome() {
      showPage('home-page');
      document.getElementById('home-loading').classList.remove('hidden');
      document.getElementById('home-content').classList.add('hidden');
      loadQuizzes();
    }

    function closeModal(id) {
      document.getElementById(id).classList.add('hidden');
    }

    // ====================== START ======================
    loadQuizzes();
  </script>

  <footer style="text-align:center; padding: 2rem; color: #7a7a9a; font-family: 'Cairo', sans-serif; border-top: 1px solid #2a2a3a; margin-top: 3rem;">

  </footer>
